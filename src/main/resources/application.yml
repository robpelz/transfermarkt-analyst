server:
  port: 8080

spring:
  application:
    name: Transfermarkt-Analyst
  datasource:
    url: jdbc:sqlite:./data/transfermarkt.db
    driver-class-name: org.sqlite.JDBC
    username: sa
    password:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  sql:
    init:
      mode: always
  cache:
    type: simple
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        #database-platform: org.hibernate.community.dialect.SQLiteDialect

app:
  scoring:
    weights:
      position: 0.30
      price: 0.25
      age: 0.20
      experience: 0.15
      competition: 0.10
    thresholds:
      must-have: 85
      very-good: 75
      solid: 65
      average: 55
      risky: 45
  club:
    min-transfers-for-score: 5
    default-league: "Serie A"
  logging:
    include-timestamp: true
    include-player-details: false

sofifa:
  api:
    base-url: http://localhost:5000
    timeout: 5000

thesportsdb:
  api:
    base-url: https://www.thesportsdb.com/api/v1/json/3

api-football:
  key: 77068857c32c1fd4c9100a2fb9640b15
  host: v3.football.api-sports.io