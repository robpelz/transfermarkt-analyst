name: Java CI Clean Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java 22 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: "22"
          distribution: "temurin"
          # WICHTIG: KEINE "cache: maven" Zeile hier! Das verbietet GitHub den vorzeitigen Absturz.

      - name: Java-Code vollautomatisch finden und testen
        run: |
          # Sucht die pom.xml im gesamten Repository, vˆllig egal ob Ordner groﬂ oder klein geschrieben sind
          POM_PATH=$(find . -iname "pom.xml" | head -n 1)
          if [ -z "$POM_PATH" ]; then
            echo "FEHLER: Es wurde absolut keine pom.xml im Repository gefunden!"
            exit 1
          fi
          echo "pom.xml gefunden unter: $POM_PATH"
          mvn -B -f "$POM_PATH" clean test -Dspring-boot.repackage.skip=true
