name: Java CI Clean Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java 22 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: "22"
          distribution: "temurin"

      - name: Java-Code dynamisch finden und testen
        run: |
          # Findet die pom.xml, egal wie tief oder in welchem Ordner sie versteckt ist
          POM_PATH=$(find . -name "pom.xml" | head -n 1)
          if [ -z "$POM_PATH" ]; then
            echo "FEHLER: Es wurde absolut keine pom.xml im Repository gefunden!"
            exit 1
          fi
          echo "pom.xml gefunden unter: $POM_PATH"
          
          # F³hrt den Test genau dort aus und ³berspringt den Spring-Boot-Fehler
          mvn -B -f "$POM_PATH" clean test -Dspring-boot.repackage.skip=true
